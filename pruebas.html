<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Pruebas CSS</title>
    
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: #ECECEC;
            color: #0B0B0B;
            font-family: "Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", "DejaVu Sans", Verdana, "sans-serif";
            margin: 0px;
            padding: 0px;
            font-size: 16px;
        }
        
         /*Este estilo es importante para ue se dejen de aplicar los float*/
        .clear {
            clear: both;
        }
        
        h1 {
            font-size: 4em;
            font-family: Constantia, "Lucida Bright", "DejaVu Serif", Georgia, "serif";
            margin: 0.4em;
            padding: 0.2em 0em;
            
        }
        
        .encabezado {
            background-color: #C50FB3;
            color: #F0F0F0;
            text-align: center;
            overflow: auto;

        }
        
        .segunda div {
            background-color: aqua;
            width: 50%;
            float: left;
            border: black solid 1px;
            padding: 4px 0px 3px 6px;
            
        }
        
        .cuerpo {
            background-color: white;
            
        }
        
        /* Comentario en CSS */
        
        .parent_item {
            width: 25%;
            margin: 0px;
            float: left;
            padding-left: 15px;
            padding-top: 15px;
        }
        
        .cuerpo_item {
           
            height: 100px;
            
            text-align: center;
            padding-top: 40px;
            border: solid 1px black;
            /*margin: 5px;*/
        }
        
        .bg_purple {
            background-color: #A566EB;
            
        }
        
        .bg_green {
            background-color: #6EE58E;
        }
        
        .bg_red {
            background-color: #E95B5D;
            
        }
        .bg_blue {
            background-color: #3A9BEB;
            
        }
        
        .pie {
            background-color: black;
            color: white;
            text-align: center;
            margin-top: 20px;
                
        }
        
       
    
    
    </style>
    
    
    
</head>

<body>
    
    <div class="encabezado">
        <h1>Mi página de pruebas</h1>
    </div>
    
    <div class="segunda">
        <div>Parte izquierda</div>
        <div>Parte derecha</div>
    </div>
    
    <div class="clear"></div>
    
    <!--Comienza el cuerpo-->
    <div class="cuerpo">
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        <div class="parent_item">
            <div class="cuerpo_item bg_purple">Hola mundo</div>
        </div>
        
        
        
        <!--
        <div class="cuerpo_item bg_green"></div>
        <div class="cuerpo_item bg_blue"></div>
        <div class="cuerpo_item bg_red"></div>
        <div class="cuerpo_item bg_green"></div>
        
        <div class="cuerpo_item bg_red"></div>
        <div class="cuerpo_item bg_purple"></div>
        
        
        <div class="cuerpo_item bg_blue"></div>
-->
        
        
        
        
        
    </div>
    <!--Termina el cuerpo-->
    
    <div class="clear"></div>
    
    
    
    <div class="pie" style="background-color: black; height: 50px">
    
    
    </div>
</body>
</html>
