<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Práctica CSS</title>
    
    
    
    <style>
    
        * {
            box-sizing: border-box;
        }
        .content {
            overflow: auto;
            background-color: #4FE5CC;
            border: solid black 1px;
        }
        
        .row {
            overflow: auto;
            
            border-bottom: solid black 1px;
        }
        
        .item {
            width: 25%;
            float: left;
            margin: 10px;
        }
        
        .item img {
            width: 100%;
            
        }
        
        .img_item {
            background-color: white;
            padding: 15px;
        }
        
        .clear {
            clear: both;
        }
        
        .txt_item {
            font-size: 0.7em;
            font-family: Gotham, "Helvetica Neue", Helvetica, Arial, "sans-serif";
            margin: 5px 0px 5px 10px;
        }
    
    </style>
</head>

<body>
    
    <div class="content">
        <div class="row">
            
            
            <div class="item">
                <div class="img_item">
                    <img src="img/portfolio/koala.jpg" alt="Koala">
                </div>

                <div class="txt_item">
                    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dolorem expedita ad tenetur sint eos labore corporis libero nobis. Necessitatibus, maiores?</p>
                </div>

            </div>
            
            
        
        
        
        
        </div>
    
    
    
    
    </div>
</body>
</html>
